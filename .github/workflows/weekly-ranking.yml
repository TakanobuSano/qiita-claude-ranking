name: Weekly Qiita Claude Ranking

on:
  workflow_dispatch:
  schedule:
    # 毎日 09:37 JST に実行
    # GitHub Actions の cron は UTC 基準
    - cron: "37 0 * * *"
    - cron: "35 1 * * *"

permissions:
  contents: write

jobs:
  fetch-ranking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Qiita ranking script
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
        run: |
          python fetch_ranking.py

      - name: Commit ranking outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update weekly Qiita Claude ranking"
            git push
          fi

      - name: Update Qiita item
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
          QIITA_ITEM_ID: ${{ secrets.QIITA_ITEM_ID }}
          QIITA_POST_PRIVATE: "true"
        run: |
          python update_qiita_item.py
