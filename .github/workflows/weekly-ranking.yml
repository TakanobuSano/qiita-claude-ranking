name: Weekly Qiita Claude Ranking

on:
  workflow_dispatch:

  schedule:
    - cron: "13 9 * * 1"
      timezone: "Asia/Tokyo"

permissions:
  contents: write

jobs:
  fetch-ranking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Qiita ranking script
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
        run: |
          python fetch_ranking.py

      - name: Commit ranking outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update weekly Qiita Claude ranking"
            git push
          fi

      - name: Update Qiita item
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.3f7f3f81c882010aeba4db4262f324403fa3b3f3 }}
          QIITA_ITEM_ID: ${{ secrets.QIITA_ITEM_ID }}
          QIITA_POST_PRIVATE: "true"
        run: |
          python update_qiita_item.py
